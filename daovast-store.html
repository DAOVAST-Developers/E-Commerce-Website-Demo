*{margin:0;padding:0;box-sizing:border-box}
:root{

  --border:#ffffff12;--border2:#ffffff1e;

  --font:'Syne',sans-serif;--body:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
  --shadow:0 4px 24px #0008;--shadow2:0 12px 48px #000c;
}
body{background:var(--bg);color:var(--text);font-family:var(--body);-webkit-font-smoothing:antialiased}
button{cursor:pointer;border:none;font-family:var(--body)}
input,select{font-family:var(--body)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--accent);border-radius:2px}
.fi{animation:fi .35s ease both}
.su{animation:su .4s cubic-bezier(.16,1,.3,1) both}
.sc{animation:sc .3s cubic-bezier(.16,1,.3,1) both}
@keyframes fi{from{opacity:0}to{opacity:1}}
@keyframes su{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes sc{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
#root{min-height:100vh}
</style>

            </span>

  const [err,setErr]=useState("");

  const [sp,setSp]=useState(false);
  const upd=k=>v=>setF(p=>({...p,[k]:v}));

  const submit=async()=>{
    setErr("");setLoading(true);

    if(mode==="login"){

              <div key={item.id} style={{display:"flex",alignItems:"center",gap:"10px"}}>
                {i>0&&<span style={{color:"var(--text3)",fontSize:"17px"}}>+</span>}

                </div>
              </div>
            ))}
            <div style={{marginLeft:"13px"}}>
              <div style={{fontSize:"10px",color:"var(--text3)",marginBottom:"2px"}}>Bundle</div>
              <div style={{fontFamily:"var(--mono)",fontSize:"16px",fontWeight:"700",color:"var(--accent)"}}>{fp([p,...fb].reduce((s,i)=>s+i.price,0))}</div>

            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── CART DRAWER ───────────────────────────────────────────────────────────────
function CartDrawer({cart,onClose,onRemove,onQty,onCheckout}) {
  const total=cart.reduce((s,i)=>s+i.price*(i.qty||1),0);
  const saved=cart.reduce((s,i)=>s+(i.originalPrice-i.price)*(i.qty||1),0);
  return (
    <div style={{position:"fixed",inset:0,zIndex:1500}}>
      <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,.65)",backdropFilter:"blur(8px)"}} onClick={onClose}/>
      <div className="su" style={{position:"absolute",right:0,top:0,bottom:0,width:"min(390px,100vw)",background:"var(--bg2)",borderLeft:"1px solid var(--border2)",display:"flex",flexDirection:"column"}}>
        <div style={{padding:"17px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <h2 style={{fontFamily:"var(--font)",fontSize:"16px",fontWeight:"700"}}>Cart <span style={{color:"var(--text3)",fontWeight:"400",fontSize:"12px"}}>({cart.length})</span></h2>
          <button onClick={onClose} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--text2)",width:"30px",height:"30px",borderRadius:"7px",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><I.X/></button>
        </div>
        <div style={{flex:1,overflowY:"auto",padding:"13px 20px",display:"flex",flexDirection:"column",gap:"10px"}}>
          {cart.length===0?(
            <div style={{textAlign:"center",padding:"50px 0",color:"var(--text3)"}}>
              <div style={{fontSize:"42px",marginBottom:"10px"}}>🛒</div><p style={{fontSize:"13px"}}>Your cart is empty</p>
              <button onClick={onClose} style={{background:"var(--accent)",color:"#fff",padding:"8px 16px",borderRadius:"8px",marginTop:"13px",fontSize:"12px",fontWeight:"600",border:"none",cursor:"pointer"}}>Start Shopping</button>
            </div>
          ):cart.map((item,i)=>(
            <div key={i} style={{background:"var(--card)",borderRadius:"10px",padding:"10px",display:"flex",gap:"10px"}}>
              <img src={item.image} alt="" style={{width:"64px",height:"64px",borderRadius:"6px",objectFit:"cover",flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:"10px",color:"var(--text3)",marginBottom:"1px"}}>{item.brand}</div>
                <div style={{fontWeight:"600",fontSize:"12px",marginBottom:"3px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.name}</div>
                {item.sz&&<div style={{fontSize:"9px",color:"var(--text3)",marginBottom:"3px"}}>Size: {item.sz}</div>}
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                  <span style={{fontFamily:"var(--mono)",fontWeight:"700",fontSize:"13px"}}>{fp(item.price*(item.qty||1))}</span>
                  <div style={{display:"flex",alignItems:"center",gap:"4px"}}>
                    <button onClick={()=>onQty(i,Math.max(1,(item.qty||1)-1))} style={{width:"22px",height:"22px",background:"var(--card2)",color:"var(--text)",borderRadius:"5px",fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center",border:"none",cursor:"pointer"}}>−</button>
                    <span style={{fontFamily:"var(--mono)",fontSize:"11px",width:"16px",textAlign:"center"}}>{item.qty||1}</span>
                    <button onClick={()=>onQty(i,(item.qty||1)+1)} style={{width:"22px",height:"22px",background:"var(--card2)",color:"var(--text)",borderRadius:"5px",fontSize:"13px",display:"flex",alignItems:"center",justifyContent:"center",border:"none",cursor:"pointer"}}>+</button>
                    <button onClick={()=>onRemove(i)} style={{width:"22px",height:"22px",background:"#ef444418",color:"#ef4444",borderRadius:"5px",display:"flex",alignItems:"center",justifyContent:"center",marginLeft:"3px",border:"none",cursor:"pointer"}}><I.X/></button>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
        {cart.length>0&&(
          <div style={{borderTop:"1px solid var(--border)",padding:"16px 20px"}}>
            {saved>0&&<div style={{background:"#10b98112",border:"1px solid #10b98123",borderRadius:"7px",padding:"6px 10px",fontSize:"10px",color:"var(--green)",marginBottom:"10px"}}>🎉 You save {fp(saved)}!</div>}
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{color:"var(--text2)",fontSize:"11px"}}>Subtotal</span><span style={{fontFamily:"var(--mono)",fontSize:"12px",fontWeight:"600"}}>{fp(total)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}><span style={{color:"var(--text2)",fontSize:"11px"}}>Delivery</span><span style={{color:"var(--green)",fontSize:"11px"}}>{total>999?"FREE":"₹99"}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:"13px",paddingTop:"8px",borderTop:"1px solid var(--border)"}}>
              <span style={{fontWeight:"700",fontSize:"14px",fontFamily:"var(--font)"}}>Total</span>
              <span style={{fontFamily:"var(--mono)",fontWeight:"700",fontSize:"16px"}}>{fp(total+(total>999?0:99))}</span>

            <button onClick={onCheckout} style={{width:"100%",background:"var(--accent)",color:"#fff",padding:"13px",borderRadius:"10px",fontSize:"14px",fontWeight:"700",fontFamily:"var(--font)",display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",border:"none",cursor:"pointer"}}>
              Checkout →
            </button>

          </div>
        )}
      </div>
    </div>
  );
}

// ── CHECKOUT ──────────────────────────────────────────────────────────────────
function Checkout({cart,user,onBack,onSuccess}) {
  const [step,setStep]=useState(1);
  const [addr,setAddr]=useState({name:user?.name||"",phone:user?.phone||"",line:"",city:"Alwar",state:"Rajasthan",pin:""});
  const [pm,setPm]=useState("upi");
  const [upi,setUpi]=useState("");
  const [card,setCard]=useState({num:"",exp:"",cvv:"",name:""});
  const [proc,setProc]=useState(false);
  const [err,setErr]=useState("");
  const sub=cart.reduce((s,i)=>s+i.price*(i.qty||1),0);
  const del=sub>999?0:99;
  const total=sub+del;
  const oid="NX"+Date.now().toString().slice(-8);

  const pay=async()=>{
    setErr("");setProc(true);
    if(pm==="upi"&&!upi){setErr("Enter UPI ID");setProc(false);return;}
    if(pm==="card"&&(!card.num||!card.exp||!card.cvv)){setErr("Fill all card fields");setProc(false);return;}
    await new Promise(r=>setTimeout(r,2600));
    if(Math.random()<0.95) onSuccess(oid);
    else{setErr("Payment failed. Please retry.");setProc(false);}
  };

  const Dot=({n,lbl})=>(
    <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"3px"}}>
      <div style={{width:"28px",height:"28px",borderRadius:"50%",background:step>=n?"var(--accent)":"var(--card2)",border:step===n?"2px solid var(--accent)":"1px solid var(--border)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"700",color:step>=n?"#fff":"var(--text3)",transition:"all .3s"}}>
        {step>n?<I.Check/>:n}
      </div>
      <span style={{fontSize:"9px",color:step>=n?"var(--accent)":"var(--text3)",fontFamily:"var(--mono)",textTransform:"uppercase",letterSpacing:".05em"}}>{lbl}</span>
    </div>
  );

  return (
    <div className="fi" style={{maxWidth:"820px",margin:"0 auto",padding:"26px 20px"}}>
      <button onClick={onBack} style={{background:"none",color:"var(--text3)",fontSize:"11px",display:"flex",alignItems:"center",gap:"5px",marginBottom:"20px",border:"none",cursor:"pointer"}}><I.Back/> Back to Cart</button>
      <h1 style={{fontFamily:"var(--font)",fontSize:"21px",fontWeight:"700",marginBottom:"20px"}}>Checkout</h1>
      <div style={{display:"flex",alignItems:"center",marginBottom:"26px"}}>
        <Dot n={1} lbl="Address"/>
        <div style={{flex:1,height:"2px",background:step>=2?"var(--accent)":"var(--border)",transition:"background .3s",margin:"0 6px",marginBottom:"17px"}}/>
        <Dot n={2} lbl="Payment"/>
        <div style={{flex:1,height:"2px",background:step>=3?"var(--accent)":"var(--border)",transition:"background .3s",margin:"0 6px",marginBottom:"17px"}}/>
        <Dot n={3} lbl="Review"/>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 280px",gap:"18px",alignItems:"start"}}>
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"24px"}}>
          {step===1&&(
            <div className="su">
              <h2 style={{fontFamily:"var(--font)",fontSize:"16px",fontWeight:"700",marginBottom:"16px"}}>Delivery Address</h2>
              {user?.addresses?.length>0&&(
                <div style={{background:"var(--card2)",border:"2px solid var(--accent)",borderRadius:"10px",padding:"12px",marginBottom:"16px",cursor:"pointer"}} onClick={()=>{setAddr({...user.addresses[0],name:user.name,phone:user.phone});setStep(2);}}>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:"2px"}}><span style={{fontWeight:"600",fontSize:"12px"}}>{user.addresses[0].label}</span><span style={{fontSize:"10px",color:"var(--accent)"}}>Use this →</span></div>
                  <p style={{fontSize:"11px",color:"var(--text2)"}}>{user.addresses[0].line}, {user.addresses[0].city} – {user.addresses[0].pin}</p>
                </div>
              )}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"10px"}}>
                <Inp label="Full Name" value={addr.name} onChange={v=>setAddr({...addr,name:v})} placeholder="Rahul Sharma"/>
                <Inp label="Phone" value={addr.phone} onChange={v=>setAddr({...addr,phone:v})} placeholder="+91 98765 43210"/>
                <div style={{gridColumn:"1/-1"}}><Inp label="Address" value={addr.line} onChange={v=>setAddr({...addr,line:v})} placeholder="Street, Area, Landmark"/></div>
                <Inp label="City" value={addr.city} onChange={v=>setAddr({...addr,city:v})} placeholder="Alwar"/>
                <Inp label="PIN Code" value={addr.pin} onChange={v=>setAddr({...addr,pin:v})} placeholder="301001"/>
              </div>
              {err&&<p style={{color:"#ef4444",fontSize:"11px",marginTop:"6px"}}>{err}</p>}
              <button onClick={()=>{if(!addr.name||!addr.line||!addr.pin){setErr("Fill required fields");return;}setErr("");setStep(2);}} style={{width:"100%",background:"var(--accent)",color:"#fff",padding:"11px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",fontFamily:"var(--font)",marginTop:"16px",border:"none",cursor:"pointer"}}>Continue →</button>
            </div>
          )}
          {step===2&&(
            <div className="su">
              <h2 style={{fontFamily:"var(--font)",fontSize:"16px",fontWeight:"700",marginBottom:"16px"}}>Payment Method</h2>
              {[{id:"upi",label:"UPI",icon:"📱",sub:"PhonePe · Google Pay · Paytm"},{id:"card",label:"Credit / Debit Card",icon:"💳",sub:"Visa · Mastercard · Rupay"},{id:"cod",label:"Cash on Delivery",icon:"💵",sub:"Pay at your door"},{id:"bnpl",label:"Buy Now Pay Later",icon:"⏳",sub:"LazyPay · Amazon Pay Later"},{id:"netbanking",label:"Net Banking",icon:"🏦",sub:"All major banks"}].map(m=>(
                <button key={m.id} onClick={()=>setPm(m.id)} style={{display:"flex",alignItems:"center",gap:"11px",padding:"12px 13px",borderRadius:"10px",border:`1.5px solid ${pm===m.id?"var(--accent)":"var(--border)"}`,background:pm===m.id?"#7c6aff0d":"var(--card2)",width:"100%",marginBottom:"6px",textAlign:"left",transition:"all .2s",cursor:"pointer"}}>
                  <span style={{fontSize:"18px"}}>{m.icon}</span>
                  <div style={{flex:1}}><div style={{fontWeight:"600",fontSize:"12px",color:pm===m.id?"var(--accent)":"var(--text)"}}>{m.label}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>{m.sub}</div></div>
                  <div style={{width:"15px",height:"15px",borderRadius:"50%",border:`2px solid ${pm===m.id?"var(--accent)":"var(--border2)"}`,display:"flex",alignItems:"center",justifyContent:"center"}}>
                    {pm===m.id&&<div style={{width:"7px",height:"7px",borderRadius:"50%",background:"var(--accent)"}}/>}
                  </div>
                </button>
              ))}
              {pm==="upi"&&(
                <div style={{marginTop:"13px"}}>
                  <Inp label="UPI ID" value={upi} onChange={setUpi} placeholder="name@paytm"/>
                  <div style={{display:"flex",gap:"6px",marginTop:"6px",flexWrap:"wrap"}}>
                    {["@paytm","@oksbi","@ybl","@okhdfcbank"].map(s=><button key={s} onClick={()=>setUpi("user"+s)} style={{background:"var(--card2)",border:"1px solid var(--border)",color:"var(--text3)",padding:"3px 8px",borderRadius:"5px",fontSize:"10px",fontFamily:"var(--mono)",cursor:"pointer"}}>{s}</button>)}
                  </div>
                </div>
              )}
              {pm==="card"&&(
                <div style={{marginTop:"13px",display:"flex",flexDirection:"column",gap:"8px"}}>
                  <Inp label="Card Number" value={card.num} onChange={v=>setCard({...card,num:v})} placeholder="1234 5678 9012 3456"/>
                  <Inp label="Name on Card" value={card.name} onChange={v=>setCard({...card,name:v})} placeholder="RAHUL SHARMA"/>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"8px"}}>
                    <Inp label="Expiry" value={card.exp} onChange={v=>setCard({...card,exp:v})} placeholder="MM/YY"/>
                    <Inp label="CVV" value={card.cvv} onChange={v=>setCard({...card,cvv:v})} placeholder="123"/>
                  </div>
                </div>
              )}
              {err&&<div style={{background:"#ef444412",border:"1px solid #ef444428",borderRadius:"7px",padding:"8px",fontSize:"11px",color:"#ef4444",marginTop:"10px"}}>{err}</div>}
              <button onClick={()=>setStep(3)} style={{width:"100%",background:"var(--accent)",color:"#fff",padding:"11px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",fontFamily:"var(--font)",marginTop:"16px",border:"none",cursor:"pointer"}}>Review Order →</button>
            </div>
          )}
          {step===3&&(
            <div className="su">
              <h2 style={{fontFamily:"var(--font)",fontSize:"16px",fontWeight:"700",marginBottom:"16px"}}>Review & Confirm</h2>
              <div style={{background:"var(--card2)",borderRadius:"10px",padding:"12px",marginBottom:"10px"}}>
                <div style={{fontSize:"9px",color:"var(--text3)",fontFamily:"var(--mono)",textTransform:"uppercase",marginBottom:"4px"}}>Delivering To</div>
                <p style={{fontSize:"12px",fontWeight:"600"}}>{addr.name}</p>
                <p style={{fontSize:"11px",color:"var(--text2)"}}>{addr.line}, {addr.city} – {addr.pin}</p>
                <button onClick={()=>setStep(1)} style={{background:"none",color:"var(--accent)",fontSize:"10px",marginTop:"4px",border:"none",cursor:"pointer"}}>Edit</button>
              </div>
              <div style={{background:"var(--card2)",borderRadius:"10px",padding:"12px",marginBottom:"16px"}}>
                <div style={{fontSize:"9px",color:"var(--text3)",fontFamily:"var(--mono)",textTransform:"uppercase",marginBottom:"4px"}}>Payment</div>
                <p style={{fontSize:"12px",fontWeight:"600"}}>{({upi:"UPI",card:"Credit/Debit Card",cod:"Cash on Delivery",bnpl:"Buy Now Pay Later",netbanking:"Net Banking"})[pm]}</p>
                {pm==="upi"&&upi&&<p style={{fontSize:"11px",color:"var(--text2)"}}>{upi}</p>}
                <button onClick={()=>setStep(2)} style={{background:"none",color:"var(--accent)",fontSize:"10px",marginTop:"4px",border:"none",cursor:"pointer"}}>Change</button>
              </div>
              {cart.map((item,i)=>(
                <div key={i} style={{display:"flex",gap:"8px",marginBottom:"8px"}}>
                  <img src={item.image} alt="" style={{width:"42px",height:"42px",borderRadius:"6px",objectFit:"cover"}}/>
                  <div style={{flex:1}}><div style={{fontSize:"11px",fontWeight:"600"}}>{item.name}</div><div style={{fontSize:"10px",color:"var(--text3)"}}>×{item.qty||1}{item.sz?` · ${item.sz}`:""}</div></div>
                  <span style={{fontFamily:"var(--mono)",fontSize:"11px",fontWeight:"600"}}>{fp(item.price*(item.qty||1))}</span>
                </div>
              ))}
              {err&&<div style={{background:"#ef444412",border:"1px solid #ef444428",borderRadius:"7px",padding:"8px",fontSize:"11px",color:"#ef4444",margin:"10px 0"}}>{err}</div>}
              <button onClick={pay} disabled={proc} style={{width:"100%",background:proc?"var(--card2)":"var(--green)",color:"#fff",padding:"13px",borderRadius:"10px",fontSize:"13px",fontWeight:"700",fontFamily:"var(--font)",marginTop:"6px",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px",transition:"all .3s",border:"none",cursor:"pointer"}}>
                {proc?<><Spin/> Processing…</>:<><I.Lock/> Pay {fp(total)} Securely</>}
              </button>
              <p style={{textAlign:"center",fontSize:"9px",color:"var(--text3)",marginTop:"8px"}}>Razorpay · PCI DSS · 256-bit SSL</p>
            </div>
          )}
        </div>
        <div style={{background:"var(--card)",border:"1px solid var(--border)",borderRadius:"16px",padding:"16px",position:"sticky",top:"86px"}}>
          <h3 style={{fontFamily:"var(--font)",fontSize:"14px",fontWeight:"700",marginBottom:"12px"}}>Order Summary</h3>
          {cart.map((item,i)=>(
            <div key={i} style={{display:"flex",justifyContent:"space-between",marginBottom:"6px",fontSize:"10px"}}>
              <span style={{color:"var(--text2)",flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:"6px"}}>{item.name} ×{item.qty||1}</span>
              <span style={{fontFamily:"var(--mono)",flexShrink:0}}>{fp(item.price*(item.qty||1))}</span>
            </div>
          ))}
          <div style={{borderTop:"1px solid var(--border)",paddingTop:"10px",marginTop:"10px"}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",marginBottom:"4px"}}><span style={{color:"var(--text2)"}}>Subtotal</span><span style={{fontFamily:"var(--mono)"}}>{fp(sub)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:"10px",marginBottom:"10px"}}><span style={{color:"var(--text2)"}}>Delivery</span><span style={{color:"var(--green)"}}>{del===0?"FREE":fp(del)}</span></div>
            <div style={{display:"flex",justifyContent:"space-between",fontWeight:"700",fontSize:"14px"}}><span style={{fontFamily:"var(--font)"}}>Total</span><span style={{fontFamily:"var(--mono)"}}>{fp(total)}</span></div>
          </div>
          <div style={{marginTop:"12px",borderTop:"1px solid var(--border)",paddingTop:"11px",textAlign:"center"}}>
            <div style={{fontSize:"9px",color:"var(--text3)",marginBottom:"6px"}}>Accepted Payments</div>
            <div style={{display:"flex",justifyContent:"center",gap:"6px",fontSize:"15px"}}>{"📱 💳 🏦 💵 ⏳".split(" ").map((e,i)=><span key={i}>{e}</span>)}</div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── FILTERS ───────────────────────────────────────────────────────────────────
function Filters({cat,fi,onChange}) {
  const cf={sizes:["XS","S","M","L","XL","XXL"],fit:["Slim","Regular","Oversized","Athletic"],fabric:["Cotton","Linen","Silk","Denim","Nylon"],occasion:["Casual","Formal","Streetwear","Sports","Party"]};
  const gf={ram:["4GB","8GB","12GB","16GB"],storage:["32GB","64GB","128GB","256GB","512GB"],subcategory:["audio","wearables","tablets","laptops","cameras","accessories"]};
  const f=(cat==="clothing"||cat==="deals"&&false)?cf:(cat==="gadgets"?gf:cf);
  return (

// ── CATEGORY PAGE ─────────────────────────────────────────────────────────────
function CatPage({cat,sq,wish,onWish,onView,onCart}) {
  const [fi,setFi]=useState({});
  const [sort,setSort]=useState("popular");
  const [showF,setShowF]=useState(true);

  let prods=PRODUCTS.filter(p=>{
    if(cat==="deals") return disc(p.originalPrice,p.price)>=20;
    if(cat==="all") return true;
    if(cat==="search") return p.name.toLowerCase().includes(sq.toLowerCase())||p.brand.toLowerCase().includes(sq.toLowerCase());
    return p.category===cat;
  });
  if(fi.price){const [mn,mx]=fi.price.split("-").map(Number);prods=prods.filter(p=>p.price>=mn&&p.price<=mx);}
  if(fi.rating) prods=prods.filter(p=>p.rating>=fi.rating);
  if(fi.fit) prods=prods.filter(p=>p.fit===fi.fit);
  if(fi.fabric) prods=prods.filter(p=>p.fabric===fi.fabric);
  if(fi.occasion) prods=prods.filter(p=>p.occasion===fi.occasion);
  if(fi.subcategory) prods=prods.filter(p=>p.subcategory===fi.subcategory);
  if(fi.ram) prods=prods.filter(p=>p.ram===fi.ram);
  if(fi.storage) prods=prods.filter(p=>p.storage===fi.storage);
  if(fi.sizes) prods=prods.filter(p=>p.sizes&&p.sizes.includes(fi.sizes));

  const sorted=[...prods].sort((a,b)=>{
    if(sort==="price-low") return a.price-b.price;
    if(sort==="price-high") return b.price-a.price;
    if(sort==="rating") return b.rating-a.rating;
    if(sort==="discount") return disc(b.originalPrice,b.price)-disc(a.originalPrice,a.price);
    return b.soldCount-a.soldCount;
  });

  const lbl={clothing:"Clothing",gadgets:"Gadgets",deals:"🔥 Hot Deals",all:"All Products",search:`"${sq}"`}[cat]||"Products";

  return (
    <div style={{maxWidth:"1340px",margin:"0 auto",padding:"26px 20px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"16px",flexWrap:"wrap",gap:"10px"}}>
        <div><h1 style={{fontFamily:"var(--font)",fontSize:"21px",fontWeight:"700"}}>{lbl}</h1><p style={{color:"var(--text3)",fontSize:"11px",marginTop:"1px"}}>{sorted.length} products</p></div>
        <div style={{display:"flex",gap:"8px",alignItems:"center"}}>
          <button onClick={()=>setShowF(!showF)} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--text2)",padding:"6px 12px",borderRadius:"8px",fontSize:"11px",display:"flex",alignItems:"center",gap:"5px",cursor:"pointer"}}>
            <I.Filter/> Filters{Object.values(fi).filter(Boolean).length>0?` (${Object.values(fi).filter(Boolean).length})`:""}
          </button>
          <select value={sort} onChange={e=>setSort(e.target.value)} style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--text)",padding:"6px 12px",borderRadius:"8px",fontSize:"11px",outline:"none",cursor:"pointer"}}>
            <option value="popular">Popular</option>
            <option value="price-low">Price: Low ↑</option>
            <option value="price-high">Price: High ↓</option>
            <option value="rating">Top Rated</option>
            <option value="discount">Best Deal</option>
          </select>
        </div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:showF?"210px 1fr":"1fr",gap:"16px",alignItems:"start"}}>
        {showF&&<Filters cat={cat} fi={fi} onChange={setFi}/>}
        {sorted.length===0?(
          <div style={{textAlign:"center",padding:"68px",color:"var(--text3)"}}>
            <div style={{fontSize:"42px",marginBottom:"10px"}}>🔍</div>
            <p style={{marginBottom:"10px",fontSize:"13px"}}>No products match your filters.</p>
            <button onClick={()=>setFi({})} style={{background:"var(--accent)",color:"#fff",padding:"8px 16px",borderRadius:"8px",fontSize:"12px",fontWeight:"600",border:"none",cursor:"pointer"}}>Clear Filters</button>
          </div>
        ):(
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(185px,1fr))",gap:"13px"}}>
            {sorted.map(p=><PCard key={p.id} p={p} onView={onView} onCart={onCart} wish={wish} onWish={onWish}/>)}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {
  const [page,setPage]=useState("home");
  const [user,setUser]=useState(null);
  const [cart,setCart]=useState([]);
  const [wish,setWish]=useState([]);
  const [orders,setOrders]=useState([]);
  const [showAuth,setShowAuth]=useState(false);
  const [showCart,setShowCart]=useState(false);
  const [checkout,setCheckout]=useState(false);
  const [selProd,setSelProd]=useState(null);
  const [sq,setSq]=useState("");
  const [oid,setOid]=useState(null);
  const [shopCat,setShopCat]=useState("all");

  const nav=p=>{
    if(p==="account"&&!user){setShowAuth(true);return;}
    setPage(p);setSelProd(null);setShowCart(false);setCheckout(false);
    window.scrollTo({top:0,behavior:"smooth"});
  };
  const search=q=>{setSq(q);setShopCat("search");setPage("shop");setSelProd(null);};
  const shop=c=>{setShopCat(c);setPage("shop");setSelProd(null);window.scrollTo({top:0});};
  const view=p=>{setSelProd(p);setPage("product");window.scrollTo({top:0,behavior:"smooth"});};
  const addCart=p=>{
    setCart(c=>{
      const exists=c.findIndex(i=>i.id===p.id);
      if(exists>=0){const n=[...c];n[exists]={...n[exists],qty:(n[exists].qty||1)+1};return n;}
      return [...c,{...p,qty:p.qty||1}];
    });
  };
  const toggleWish=id=>setWish(w=>w.includes(id)?w.filter(i=>i!==id):[...w,id]);
  const doCheckout=()=>{if(!user){setShowAuth(true);return;}setShowCart(false);setCheckout(true);};
  const onSuccess=o=>{
    setOid(o);
    setOrders(prev=>[{id:o,date:new Date().toLocaleDateString("en-IN"),items:cart.length,total:cart.reduce((s,i)=>s+i.price*(i.qty||1),0),status:"Confirmed"},...prev]);
    setCart([]);setCheckout(false);setPage("success");
  };
  const rmCart=i=>setCart(c=>c.filter((_,idx)=>idx!==i));
  const qCart=(i,q)=>setCart(c=>c.map((it,idx)=>idx===i?{...it,qty:q}:it));

  return (
    <div style={{minHeight:"100vh",background:"var(--bg)"}}>
      <Navbar cart={cart} user={user} onAuth={()=>setShowAuth(true)} onCartClick={()=>setShowCart(true)} onSearch={search} onNav={nav} wish={wish} page={page}/>
      <main style={{paddingTop:page==="home"?"0":"86px"}}>
        {page==="home"&&<Home onShop={shop} onView={view} onCart={addCart} wish={wish} onWish={toggleWish}/>}
        {page==="shop"&&<CatPage cat={shopCat} sq={sq} wish={wish} onWish={toggleWish} onView={view} onCart={addCart}/>}
        {["clothing","gadgets","deals"].includes(page)&&<CatPage cat={page} sq="" wish={wish} onWish={toggleWish} onView={view} onCart={addCart}/>}
        {page==="product"&&selProd&&<PDetail p={selProd} onBack={()=>{setPage("shop");window.scrollTo({top:0});}} onCart={addCart} wish={wish} onWish={toggleWish} all={PRODUCTS}/>}
        {page==="wishlist"&&<Wishlist wish={wish} onRemove={toggleWish} onView={view} onCart={addCart}/>}
        {page==="account"&&user&&<Account user={user} onLogout={()=>{setUser(null);setPage("home");}} orders={orders}/>}
        {page==="vs"&&<VS onBack={()=>setPage("home")} onProd={view}/>}
        {checkout&&<Checkout cart={cart} user={user} onBack={()=>{setCheckout(false);setShowCart(true);}} onSuccess={onSuccess}/>}
        {page==="success"&&<Success oid={oid} onCont={()=>setPage("home")}/>}
      </main>
      {!checkout&&page!=="success"&&(
        <footer style={{borderTop:"1px solid var(--border)",padding:"32px 20px",background:"var(--bg2)"}}>
          <div style={{maxWidth:"1340px",margin:"0 auto",display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(145px,1fr))",gap:"26px"}}>
            <div>
              <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"10px"}}>
                <div style={{width:"24px",height:"24px",background:"var(--accent)",borderRadius:"5px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",fontWeight:"800",fontFamily:"var(--font)",color:"#fff"}}>N</div>
                <span style={{fontFamily:"var(--font)",fontWeight:"800",fontSize:"16px"}}>NEXUS</span>
              </div>
              <p style={{fontSize:"10px",color:"var(--text3)",lineHeight:"1.9"}}>The future of shopping. Clothing & gadgets with AR, AI & lightning delivery.</p>
            </div>
            {[{t:"Shop",l:["Clothing","Gadgets","New Arrivals","Deals"]},{t:"Help",l:["Track Order","Returns","FAQ","Contact"]},{t:"Company",l:["About","Blog","Careers","Press"]}].map(c=>(
              <div key={c.t}><div style={{fontFamily:"var(--font)",fontWeight:"600",fontSize:"11px",marginBottom:"10px"}}>{c.t}</div>{c.l.map(l=><div key={l} style={{fontSize:"10px",color:"var(--text3)",marginBottom:"5px",cursor:"pointer"}}>{l}</div>)}</div>
            ))}
            <div>
              <div style={{fontFamily:"var(--font)",fontWeight:"600",fontSize:"11px",marginBottom:"10px"}}>Newsletter</div>
              <div style={{display:"flex",gap:"6px"}}>
                <input placeholder="your@email.com" style={{background:"var(--card)",border:"1px solid var(--border)",color:"var(--text)",padding:"6px 10px",borderRadius:"6px",fontSize:"10px",flex:1,outline:"none"}}/>
                <button style={{background:"var(--accent)",color:"#fff",padding:"6px 10px",borderRadius:"6px",fontSize:"11px",fontWeight:"600",border:"none",cursor:"pointer"}}>→</button>
              </div>
              <div style={{marginTop:"10px",fontSize:"9px",color:"var(--text3)"}}>Razorpay · PCI DSS · SSL Secured</div>
            </div>
          </div>
          <div style={{borderTop:"1px solid var(--border)",marginTop:"24px",paddingTop:"16px",textAlign:"center",fontSize:"10px",color:"var(--text3)"}}>
            © 2026 NEXUS Store · Built by DAOVAST Developers, Alwar, Rajasthan
          </div>
        </footer>
      )}
      {showAuth&&<Auth onClose={()=>setShowAuth(false)} onLogin={u=>{setUser(u);setShowAuth(false);}}/>}
      {showCart&&!checkout&&<CartDrawer cart={cart} onClose={()=>setShowCart(false)} onRemove={rmCart} onQty={qCart} onCheckout={doCheckout}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
